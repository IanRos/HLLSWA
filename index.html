<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>HLL Artillery Calculator</title>

  <link href="https://fonts.googleapis.com/css2?family=Stardos+Stencil:wght@400;700&family=Special+Elite&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>

<body>
<main class="container">
<header class="page-header">
  <div class="insignia"></div>
  <h1 class="title">HLL Artillery Calculator</h1>
  <p class="sub">Meters → MIL converter for SPA & FA</p>
  <small>Recalculated for March 24, 2026 Patch 19.1</small>
</header>

<section class="arty-card">
  <div class="card-top">
    <h2>Enter Meters, get MIL</h2>
    <button id="resetBtn" class="ghost">Reset</button>
  </div>

  <!-- Step 1 -->
  <div class="row">
    <label for="step1">Artillery Category</label>
    <select id="step1">
      <option value="">— Select —</option>
      <option value="SPA">Self Propelled Artillery (SPA)</option>
      <option value="FA">Fixed Artillery (FA)</option>
    </select>
  </div>

  <!-- Step 2 -->
  <div class="row">
    <label for="step2">Faction</label>
    <select id="step2" disabled></select>
  </div>

  <!-- METERS -->
  <div class="row meters-row meters-row-large">
    <label for="meters">Meters</label>
    <div class="meters-input meters-input-large">
      <button class="round" data-m="-10">−10</button>
      <button class="round" data-m="-1">−1</button>
      <input id="meters" type="number" inputmode="numeric">
      <button class="round" data-m="1">+1</button>
      <button class="round" data-m="10">+10</button>
    </div>
  </div>

  <!-- SPA ADJUSTMENT -->
  <div class="row" id="spaAdjRow" hidden>
    <label for="spaAdj">MIL adjustment (SPA only)</label>
    <div class="meters-input meters-input-large">
      <button class="round" data-a="-10">−10</button>
      <button class="round" data-a="-1">−1</button>
      <input id="spaAdj" type="number">
      <button class="round" data-a="1">+1</button>
      <button class="round" data-a="10">+10</button>
    </div>
  </div>

  <div id="result" class="result">MIL: —</div>
  <div id="warning" class="warning" hidden></div>

  <div class="precision-row">
    <label>
      <input id="wholeToggle" type="checkbox">
      Whole number output
    </label>
  </div>
</section>

<footer class="footer">
  <small>Created by Mr. Fantastic &amp; M365 Copilot • © 2025</small>
</footer>
</main>

<script src="script.js"></script>
</body>
</html>
